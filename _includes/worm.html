<html class="no-js" lang="en">

<head>
<style>

.box{
  width: clamp(130px, 16vw, 210px);
  max-width: calc(100% - 1rem);
  font-size:10px;
  color:white;
  background-color: transparent;
  margin:16px 10px 0 0;
  display:inline-block;
  position:relative;
  vertical-align: top;
  text-align:left;
  -webkit-tap-highlight-color: transparent;
  box-sizing: border-box;
}

.image2 {
  opacity: 1;
  width: 100%;
  transition: .5s ease;
  backface-visibility: hidden;
  border-radius: 4px;
  overflow: hidden;
}

.image2 img {
  display: block;
  width: 100%;
  max-width: 100%;
  height: auto;
}

.box:hover .image2 {
  opacity: 0.3;
}

.box:hover .middle {
  opacity: 1;
}

.text {
  background-color: rgba(76, 175, 80, 0.9);
  color: white;
  font-size: 11px;
  padding: 8px 10px;
  margin-top: 6px;
  display: inline-block;
  max-width: 100%;
  box-sizing: border-box;
}

@media all and (max-width:950px){
  div.box{
     width: calc(50% - 14px);
     margin:12px 10px 0 0;
     color:white;
  }
}

@media all and (max-width:560px){
  div.box{
     width: 100%;
     margin:12px 0 0 0;
  }
}

</style>
</head>






<div class="box">
    <div class="image2">
      <img src="/resources/photos/{{a.picture}}" alt="{{a.name}}" loading="lazy" />
    </div>  
    <div class="text"> <b>{{a.name}}</b></div>  
</div> 


</html>
